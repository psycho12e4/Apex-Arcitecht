<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Architect - Workspace Dashboard</title>
    <script>
        if (!localStorage.getItem('apex_sb_session')) {
            window.location.replace('login.html');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>

    <script>
        (async function () {
            // Check if there is an active session in Supabase
            const { data: { session } } = await window.supabase.auth.getSession();

            if (!session) {
                // No active user session? Redirect straight to login
                window.location.replace('login.html');
            }
        })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap');

        body {
            background-color: #030407;
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 15% 50%, rgba(225, 6, 0, 0.08), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 30%);
            z-index: -1;
            pointer-events: none;
        }

        .f1-font {
            font-family: 'Orbitron', sans-serif;
        }

        .hero-gradient {
            background: linear-gradient(to bottom, rgba(3, 4, 7, 0.4), #030407), url('trackrea.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero-gradient::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(3, 4, 7, 0.8) 0%, rgba(3, 4, 7, 0.1) 100%);
            pointer-events: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(225, 6, 0, 0.3);
            transform: translateY(-6px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6), 0 0 24px rgba(225, 6, 0, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #e10600, #ff4d4d);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border-radius: 6px;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(225, 6, 0, 0.5);
            transform: scale(1.03) skewX(-12deg);
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0b0e14;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }

        @media (max-width: 900px) {
            header {
                height: auto !important;
                padding: 2rem 1rem !important;
            }

            header>div {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 1.25rem !important;
            }

            main {
                padding: 2rem 1rem !important;
            }
        }
    </style>
</head>

<body class="flex flex-col">

    <!-- Hero Section -->
    <header class="relative h-[45vh] flex items-end px-12 pb-12 overflow-hidden hero-gradient border-b border-white/5">
        <!-- Auth Navbar -->
        <div class="absolute top-0 right-0 p-8 z-20 flex items-center gap-4">
            <a href="tutorial.html" target="_blank"
                class="glass-card px-6 py-2.5 rounded-md text-[11px] text-white/70 tracking-[0.2em] uppercase font-bold hover:text-white hover:bg-white/5 transition-colors border border-transparent hover:border-white/20">
                Tutorial
            </a>
            <div id="user-profile" class="hidden items-center gap-3">
                <div
                    class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center border border-white/10 backdrop-blur shadow-[0_0_15px_rgba(255,255,255,0.05)]">
                    <svg class="w-4 h-4 text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
                <span id="user-email"
                    class="text-white/80 text-[11px] tracking-[0.2em] font-bold uppercase f1-font"></span>
            </div>
            <button id="auth-btn"
                class="glass-card px-8 py-2.5 rounded-md text-[11px] text-white tracking-[0.2em] uppercase font-bold hover:bg-white/10 transition-colors border border-white/20 hover:border-white/40 shadow-lg">
                Log In
            </button>
        </div>

        <div class="relative z-10 w-full max-w-7xl mx-auto flex justify-between items-end pb-8">
            <div>
                <div class="flex items-center gap-5 mb-6">
                    <div
                        class="w-14 h-14 bg-gradient-to-br from-[#ff1e00] to-[#b00300] rounded-sm transform -skew-x-12 shadow-[0_0_30px_rgba(225,6,0,0.4)]">
                    </div>
                    <h1
                        class="f1-font text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white via-white to-white/60 uppercase italic drop-shadow-xl">
                        Apex Architect
                    </h1>
                </div>
                <p class="text-white/70 text-lg max-w-xl tracking-[0.05em] uppercase font-light leading-relaxed">The
                    ultimate platform for
                    precision Formula 1 circuit design.</p>
            </div>
            <button id="create-btn"
                class="btn-primary f1-font px-10 py-5 text-[15px] text-white font-bold tracking-[0.2em] uppercase italic transform -skew-x-12 shadow-[0_10px_30px_rgba(225,6,0,0.3)]">
                <span class="inline-block skew-x-12 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    New Circuit
                </span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-7xl mx-auto px-12 py-12">
        <div class="flex items-center justify-between mb-8 border-b border-white/10 pb-4">
            <h2 class="f1-font text-xl text-white tracking-[0.2em] uppercase">Circuit Library</h2>
            <div id="stats-summary" class="text-[10px] text-white/40 font-bold uppercase tracking-widest">
                0 TOTAL DESIGNS
            </div>
        </div>

        <div id="projects-grid" class="project-grid">
            <!-- Projects injected here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-24 text-center">
            <div
                class="w-20 h-20 border-2 border-dashed border-white/10 rounded-full flex items-center justify-center mb-6 text-white/10">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                    </path>
                </svg>
            </div>
            <h3 class="f1-font text-white/40 uppercase tracking-widest text-lg mb-2">Workspace Empty</h3>
            <p class="text-white/20 text-sm max-w-xs">Start your journey by creating your first Grand Prix circuit.</p>
        </div>
    </main>

    <footer
        class="py-12 border-t border-white/5 text-center text-[10px] text-white/20 tracking-[0.3em] font-bold uppercase">
        APEX ARCHITECT DESIGN SYSTEMS &copy; 2026
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="native-bridge.js"></script>
    <script src="supabase-client.js"></script>
    <script>
        (async () => {
            // ── Auth Guard ────────────────────────────────────────────────
            const { data: { user } } = await supabase.auth.getUser();

            if (!user) {
                window.location.replace('login.html');
                return;
            }

            // 🚨 NEW: check email verification
            if (!user.email_confirmed_at) {
                document.body.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;font-family:sans-serif;background:#030407;color:white;">
            <h1 style="font-size:24px;margin-bottom:10px;">Verify Your Email</h1>
            <p style="opacity:0.7;margin-bottom:20px;">Check your inbox and click the verification link.</p>
            
            <div style="display:flex;gap:12px;">
                <button onclick="resendVerification()" style="padding:10px 20px;background:#e10600;border:none;color:white;cursor:pointer;border-radius:4px;font-weight:bold;">
                    Resend Email
                </button>
                <button onclick="signOutVerification()" style="padding:10px 20px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:white;cursor:pointer;border-radius:4px;font-weight:bold;">
                    Sign Out
                </button>
            </div>
        </div>
    `;
                return;
            }

            const currentAccountName = window.ApexNativeBridge?.accountName?.() || '';
            const currentUser = {
                displayName: user.user_metadata?.display_name || user.email.split('@')[0]
            };

            // ── UI helpers ────────────────────────────────────────────────
            const authBtn = document.getElementById('auth-btn');
            const userProfile = document.getElementById('user-profile');
            const userEmailEl = document.getElementById('user-email');
            const summary = document.getElementById('stats-summary');

            // Show logged-in user
            userProfile.classList.remove('hidden');
            userProfile.classList.add('flex');
            userEmailEl.textContent = currentUser.displayName;
            authBtn.textContent = 'Log Out';
            authBtn.onclick = async () => {
                await ApexAuth.signOut();
                window.location.replace('login.html');
            };

            // ── Project helpers ───────────────────────────────────────────
            function renderProjects(projects) {
                const container = document.getElementById('projects-grid');
                const emptyState = document.getElementById('empty-state');

                if (summary) summary.innerText = currentAccountName
                    ? currentAccountName.toUpperCase() + ' WORKSPACE'
                    : `${currentUser.displayName.toUpperCase()} WORKSPACE`;

                if (!projects || projects.length === 0) {
                    container.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }
                emptyState.classList.add('hidden');
                container.innerHTML = projects.map(p => {
                    const date = new Date(p.lastModified).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
                    const nodeCount = p.data?.nodes ? p.data.nodes.length : 0;
                    return `
                        <div class="glass-card flex flex-col cursor-pointer overflow-hidden group relative" onclick="openProject('${p.id}')">
                            <div class="absolute inset-0 bg-gradient-to-b from-white/[0.02] to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
                            <div class="h-48 bg-[#030407] relative overflow-hidden flex items-center justify-center p-8 border-b border-white/[0.03]">
                                <div class="opacity-20 group-hover:opacity-60 group-hover:text-[#e10600] transition-all transform group-hover:scale-110 duration-700 ease-out">
                                    <svg class="w-28 h-28 drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] group-hover:drop-shadow-[0_0_20px_rgba(225,6,0,0.5)] transition-all duration-700" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20,50 C20,20 80,20 80,50 S20,80 20,50Z" fill="none" />
                                    </svg>
                                </div>
                                <div class="absolute inset-0 bg-gradient-to-t from-[#030407] via-transparent to-transparent opacity-80"></div>
                                <div class="absolute top-4 right-4 bg-black/60 px-2 py-1 rounded text-[8px] text-white/50 font-bold uppercase tracking-widest border border-white/10">Grade 1</div>
                            </div>
                            <div class="p-6">
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 class="f1-font text-lg text-white font-bold italic uppercase tracking-tighter group-hover:text-[#e10600] transition-colors">${p.name}</h3>
                                        <p class="text-[10px] text-white/40 tracking-[0.2em] font-bold uppercase mt-1">Edited: ${date}</p>
                                    </div>
                                    <button onclick="deleteProject('${p.id}', event)" class="text-white/10 hover:text-red-500 transition-colors p-2">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                                <div class="grid grid-cols-2 gap-4 mt-auto">
                                    <div class="bg-black/40 border border-white/5 p-3 rounded-lg backdrop-blur-sm group-hover:bg-black/60 transition-colors">
                                        <div class="text-[9px] text-white/40 uppercase font-bold tracking-widest mb-1 flex items-center gap-1.5"><div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>Nodes</div>
                                        <div class="text-base font-bold text-white/90 font-mono">${nodeCount}</div>
                                    </div>
                                    <div class="bg-black/40 border border-white/5 p-3 rounded-lg backdrop-blur-sm group-hover:bg-black/60 transition-colors">
                                        <div class="text-[9px] text-white/40 uppercase font-bold tracking-widest mb-1 flex items-center gap-1.5"><div class="w-1.5 h-1.5 rounded-full bg-purple-500"></div>Length</div>
                                        <div class="text-base font-bold text-white/90 font-mono">${(nodeCount * 0.4).toFixed(1)} <span class="text-xs text-white/40">KM</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                }).join('');
            }

            window.openProject = id => window.location.href = `f1track.html?id=${id}`;
            window.createProject = () => window.location.href = `f1track.html?new=true`;

            window.deleteProject = async (id, event) => {
                event.stopPropagation();
                if (!confirm('Delete this circuit design?')) return;
                await ApexProjects.delete(id);
                // Re-fetch and re-render
                const projects = await ApexProjects.fetchAll();
                renderProjects(projects);
            };

            document.getElementById('create-btn').addEventListener('click', window.createProject);

            // ── Initial load: fetch from Supabase ─────────────────────────
            try {
                const projects = await ApexProjects.fetchAll();
                renderProjects(projects);
            } catch (err) {
                console.error('[Sync] Initial fetch failed:', err);
                // Fallback to local if Supabase is unreachable/not setup
                const local = JSON.parse(localStorage.getItem('apex_projects_v1') || '[]');
                renderProjects(local);
            }
        })();
    </script>
    <script>
        function signup() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    user.sendEmailVerification();
                    alert("Verification email sent!");
                });
        }
        async function resendVerification() {
            const { data: { user } } = await supabase.auth.getUser();

            if (!user) return;

            const { error } = await supabase.auth.resend({
                type: 'signup',
                email: user.email
            });

            if (!error) {
                alert("Verification email sent again!");
            } else {
                alert("Error sending email.");
                console.error(error);
            }
        }
        async function signOutVerification() {
            await ApexAuth.signOut();
            window.location.replace('login.html');
        }
    </script>

</body>

</html>
